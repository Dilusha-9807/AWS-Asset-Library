server {
    listen 80;
    server_name _;

    root /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/dist;
    index index.html;

    # API endpoints - EDB/OS Versions Backup
    location /api/edb-os-backup {
        proxy_pass http://127.0.0.1:5153;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API endpoints - Assets Inventory Backup
    location /api/assets-inventory-backup {
        proxy_pass http://127.0.0.1:5154;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API endpoints - Main Upload Service
    location /upload {
        proxy_pass http://127.0.0.1:5152;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # JSON data files - NO CACHE (important for real-time updates)
    location /data_assets/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data_assets/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /data/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /data_os_edb_versions/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data_os_edb_versions/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /data_os_edb_versions_fo/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data_os_edb_versions_fo/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /data_backup/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data_backup/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /data_validation_logs/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data_validation_logs/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /data_validation_logs_dr/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data_validation_logs_dr/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /data_validation_logs_fo/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data_validation_logs_fo/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /data_validation_logs_dr_fo/ {
        alias /works/d_dilusha/app_assets_lib/AWS-Asset-Library/Front-end/public/data_validation_logs_dr_fo/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }


    # Frontend - serve React app (must be last)
    location / {
        try_files $uri /index.html;
    }
}
